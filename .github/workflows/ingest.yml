name: Data Ingest

on:
  schedule:
    # Run daily at 4:00 AM MYT (8:00 PM UTC previous day)
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-fetch all data (bypass staleness check)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm install

      - name: Run data ingest
        run: ${{ github.event.inputs.force == 'true' && 'npm run ingest:force' || 'npm run ingest' }}

      - name: Run energy ingest
        run: npm run ingest:energy

      - name: Run bed utilization ingest
        run: npm run ingest:bedutil

      - name: Minify cache JSON
        run: |
          for f in src/lib/data/cache/data.json src/lib/data/cache/energy-data.json src/lib/data/cache/bedutil.json; do
            if [ -f "$f" ]; then
              node -e "const fs=require('fs'); const d=JSON.parse(fs.readFileSync('$f','utf8')); fs.writeFileSync('$f',JSON.stringify(d));"
            fi
          done

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/data/cache/
          if git diff --cached --quiet; then
            echo "No data changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(data): automated ingest $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.changed == 'true'
        run: npx opennextjs-cloudflare build && npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
