name: Data Ingest

on:
  schedule:
    # Run daily at 4:00 AM MYT (8:00 PM UTC previous day)
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-fetch all data (bypass staleness check)"
        type: boolean
        default: false
      deploy:
        description: "Deploy even if no data changed (for code-only changes)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm install

      # Each ingest is isolated: one script failing must not discard the
      # others' data. A final step fails the job if any of them failed.
      - name: Run data ingest
        id: ingest
        continue-on-error: true
        run: ${{ github.event.inputs.force == 'true' && 'npm run ingest:force' || 'npm run ingest' }}

      - name: Run energy ingest
        id: energy
        continue-on-error: true
        run: npm run ingest:energy

      - name: Run bed utilization ingest
        id: bedutil
        continue-on-error: true
        run: npm run ingest:bedutil

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/data/cache/
          if git diff --cached --quiet; then
            echo "No data changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            # Only app-visible cache files warrant a deploy; ingest metadata
            # (ingest-meta, vehicle-reg-counts, data-gaps) is committed silently.
            if git diff --cached --name-only | grep -qE '^src/lib/data/cache/(data|energy-data|bedutil)\.json$'; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "Only ingest metadata changed — skipping deploy"
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
            git commit -m "chore(data): automated ingest $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.changed == 'true' || github.event.inputs.deploy == 'true'
        run: |
          npx opennextjs-cloudflare build
          npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Fail if any ingest step failed
        if: steps.ingest.outcome == 'failure' || steps.energy.outcome == 'failure' || steps.bedutil.outcome == 'failure'
        run: |
          echo "ingest: ${{ steps.ingest.outcome }}, energy: ${{ steps.energy.outcome }}, bedutil: ${{ steps.bedutil.outcome }}"
          exit 1
